    <!--
    ============================================================
    EJERCICIO 04 (DESAFÍO): Landing Page
    ============================================================

    CONSIGNA:
    Creá una landing page completa para un producto o servicio
    inventado. Aplicá todo lo que sabés del Box Model.

    ESTRUCTURA DE LA PÁGINA:
    
    1. HEADER (encabezado)
       - Nombre de la marca/producto en <h1>
       - Un slogan en <p>
       - Un botón "Empezar ahora"
       - Fondo de color diferente al body
       - Padding generoso (40px+)
       - text-align: center

    2. SECCIÓN "CARACTERÍSTICAS" (features)
       - Un <h2> "¿Por qué elegirnos?"
       - 3 tarjetas lado a lado (inline-block, width: 30%)
       - Cada tarjeta con:
         · Un emoji grande como ícono
         · Un <h3> con el nombre de la feature
         · Un <p> con la descripción
         · Borde, padding, border-radius
       - Fondo de color diferente al header

    3. SECCIÓN "PRECIOS" (pricing)
       - Un <h2> "Planes"
       - 3 cards de precios (inline-block)
       - Cada card con:
         · Nombre del plan (Básico, Pro, Premium)
         · Precio en <h3> grande
         · Lista <ul> de beneficios
         · Botón "Elegir plan"
         · La card del medio con borde naranja (destacada)

    4. FOOTER (pie de página)
       - Texto "© 2026 [Tu Marca]. Hecho en BYTEC."
       - Fondo oscuro, padding, text-align: center

    REQUISITOS CSS:
    - * { box-sizing: border-box; }
    - Uso correcto de margin, padding y border
    - Al menos 3 clases CSS propias
    - Centrado con margin: 0 auto o text-align: center
    - max-width para que no se estire en pantallas grandes
    - Al menos 1 efecto :hover
    - border-radius en cards y botones

    BONUS:
    - Investigá box-shadow para darle sombra a las cards:
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
    - Probá transition para animar el hover:
      transition: transform 0.3s;
    - En el hover: transform: translateY(-5px);

    ¡Empezá a codear abajo!
    ============================================================
    -->



</body>
</html>
