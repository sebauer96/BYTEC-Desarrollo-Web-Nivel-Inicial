<body>

    <!--
    ============================================================
    EJERCICIO 03: Galería de Cards
    ============================================================

    CONSIGNA:
    Creá 3 tarjetas de proyectos que se muestren UNA AL LADO
    DE LA OTRA usando display: inline-block.

    REQUISITOS HTML:
    1. Un <h1> que diga "Mis Proyectos"
    2. Un contenedor <div class="galeria"> que envuelva las 3 cards
    3. Cada card es un <div class="project-card"> con:
       a) Un <h3> con el nombre del proyecto
       b) Un <p> con la descripción
       c) Tags de tecnología con <span class="tag">
       d) Un botón "Ver proyecto"
    
    REQUISITOS CSS (en 03-style.css):
    1. * { box-sizing: border-box; }
    2. .galeria con text-align: center (para centrar los inline-block)
    3. .project-card con:
       - display: inline-block
       - width: 30% (así entran 3 en una fila)
       - vertical-align: top (para que se alineen arriba)
       - padding, border, border-radius
       - margin entre cards
    4. Estilos para tags y botón

    PISTA IMPORTANTE:
    Cuando usás inline-block, los espacios en blanco del HTML
    entre los <div> cuentan como espacio. Si 3 cards de 33%
    no entran, probá con 30% y margin.

    ¡Empezá a codear abajo!
    ============================================================
    -->



</body>
</html>
