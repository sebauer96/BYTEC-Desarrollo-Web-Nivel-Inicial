<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 04 - Sitio Completo (Desafío)</title>
    <!--
    Vinculá tu hoja de estilos:
    <link rel="stylesheet" href="04-style.css">

    Y las fuentes de Google Fonts:
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=...&display=swap" rel="stylesheet">
    -->
</head>
<body>

    <!--
    ============================================================
    EJERCICIO 04 (DESAFÍO): Sitio Pixel Café Completo
    ============================================================

    CONSIGNA:
    Maquetá el sitio Pixel Café COMPLETO desde cero. Este es
    el ejercicio integrador donde aplicás TODO lo aprendido
    en el curso.

    ESTRUCTURA REQUERIDA:

    1. <header class="site-header">
       - Logo "🎮 PIXEL CAFÉ"
       - <nav> con 4 links a #menu, #galeria, #sobre, #contacto

    2. <main>
       a) <section class="hero">
          - Título grande, subtítulo y botón CTA
          - Background con gradient + imagen de Unsplash

       b) <section class="menu" id="menu">
          - Título "Nuestro Menú"
          - 6 cards (☕ café, 🥐 tostados, 🍪 postres, 🥤 bebidas, 🍕 pizza, 🎂 combos)

       c) <section class="gallery" id="galeria">
          - Título "Nuestro Local"
          - 4-6 imágenes de Unsplash en grid responsive

       d) <section class="about" id="sobre">
          - Título "Sobre Nosotros"
          - 2-3 párrafos con la historia del lugar

       e) <section class="contact" id="contacto">
          - Título "Visitanos"
          - Dirección, horarios, teléfono

    3. <footer class="site-footer">
       - Grid de 3 columnas: brand, links, contacto
       - Copyright al final

    REQUISITOS CSS:
    1. Variables CSS en :root para paleta y fuentes
    2. * { box-sizing: border-box; }
    3. Mobile first: empezá con celular y agregá @media min-width
    4. Al menos 2 breakpoints (768px y 1024px)
    5. Importar AL MENOS 2 fuentes de Google Fonts
    6. Hero con background-image + gradient overlay
    7. Cards con flex-wrap
    8. Galería con CSS Grid auto-fit
    9. Al menos 3 :hover effects
    10. Al menos 1 transition

    BONUS:
    - Header sticky (position: sticky; top: 0)
    - Animaciones sutiles al hacer hover en las cards
    - Smooth scroll: html { scroll-behavior: smooth; }
    - Botón "scroll to top" con position: fixed

    PALETA SUGERIDA:
    - Primario: #f75001 (naranja)
    - Secundario: #04589d (azul)
    - Fondo: #060614 (negro azulado)
    - Card: #131340
    - Texto: #e8e8f0

    RECURSOS:
    - Imágenes: https://unsplash.com (busca "coffee shop", "gaming")
    - Fuentes: https://fonts.google.com (Press Start 2P + Inter)
    - Iconos: emojis directamente en el HTML

    ¡Manos a la obra! 🚀
    ============================================================
    -->


</body>
</html>
