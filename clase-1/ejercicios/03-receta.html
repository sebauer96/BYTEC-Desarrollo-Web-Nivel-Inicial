EJERCICIO 03: Receta de Cocina
============================================================

CONSIGNA:
Creá una página con una receta de tu comida favorita.

    "Receta de [tu nombre] - Hecha con ❤️ en BYTEC"

- Agregá un <h3> "Información nutricional" con una lista
- Usá <br> dentro de un párrafo para hacer un salto de línea
- Agregá un enlace <a> a un video de YouTube con la receta

PISTAS:
- <ol> numera automáticamente (1, 2, 3...), no necesitás poner los números
- Podés usar emojis directamente en HTML: 🍗 🧅 🥔
