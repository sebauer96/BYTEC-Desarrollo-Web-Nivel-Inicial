<!--
============================================================
EJERCICIO 04 (DESAFÍO): Blog de Noticias
============================================================

CONSIGNA:
Creá una página que simule un blog de noticias sobre tecnología.
Este ejercicio es más libre y te desafía a organizar contenido.

REQUISITOS:
1. Estructura HTML completa con <title> "TechBlog - Noticias"
2. Un <h1> con el nombre del blog (inventá uno creativo)
3. Un <p> con la descripción/slogan del blog
4. Un <hr> para separar el header del contenido

5. Al menos 3 "artículos" de noticias, cada uno con:
   a) Un <h2> con el título de la noticia
   b) Un <p> en cursiva (<em>) con la fecha y autor
   c) Al menos 2 <p> con el contenido de la noticia
   d) Un enlace <a> que diga "Leer más..." (puede ir a #)
   e) Un <hr> para separar cada artículo

6. Al final de todos los artículos:
   a) Un <h2> que diga "Categorías"
   b) Una <ul> con al menos 4 categorías de noticias
   c) Un <h2> que diga "Sobre este blog"
   d) Un <p> con información del blog
   e) Un enlace a una red social

PISTAS:
- Cuando un enlace no lleva a ningún lado, usá href="#"
- Pensá en la SEMÁNTICA: usá las etiquetas correctas
  según el significado del contenido
- Podés inventar las noticias sobre cualquier tema tech

BONUS EXTRA:
- Investigá la etiqueta <article> (es semántica, envuelve
  cada artículo/noticia)
- Investigá <header> y <footer> (para el encabezado y pie)
- Investigá <nav> (para menús de navegación)

¡Empezá a codear abajo de este comentario!
============================================================
-->
