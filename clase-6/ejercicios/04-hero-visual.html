<head>

    <title>Ejercicio 04 - Hero Visual (Desafío)</title>

</head>
<body>

    <!--
    ============================================================
    EJERCICIO 04 (DESAFÍO): Hero Visual Completo
    ============================================================

    CONSIGNA:
    Diseñá una sección hero (encabezado principal) profesional
    aplicando TODO lo que aprendimos en esta clase. Combiná
    tipografía, colores, imagen y gradientes para crear algo
    que se vea muy bien.

    ESTRUCTURA SUGERIDA:

    1. NAVBAR transparente sobre la imagen
       - Logo a la izquierda
       - Links a la derecha
       - Sin fondo (o con backdrop-filter blur)

    2. HERO con:
       - Imagen de fondo de Unsplash
       - Overlay con gradiente para legibilidad
       - Título grande con tipografía display (Google Fonts)
       - Subtítulo con tipografía sans-serif
       - 2 botones (uno primario, uno secundario "outline")
       - min-height: 90vh o 100vh

    3. SECCIÓN DE FEATURES (debajo del hero)
       - 3 cards con íconos/emojis grandes
       - Cada una con título y descripción
       - Aplicar la paleta de colores

    REQUISITOS CSS:
    - Definí variables CSS en :root para tu paleta
    - Importá AL MENOS 2 fuentes de Google Fonts
    - Usá una imagen de Unsplash como background-image
    - Apilá un linear-gradient sobre la imagen (overlay)
    - Aplicá object-fit: cover si usás <img>
    - Jerarquía clara: H1 grande, H2 mediano, P legible
    - line-height entre 1.5 y 1.7 en párrafos
    - Al menos 2 :hover effects

    PALETAS SUGERIDAS:
    a) Sunset:  #ff6b6b / #4ecdc4 / #1a1a2e / #f4f4f4
    b) Forest:  #2d6a4f / #95d5b2 / #081c15 / #d8f3dc
    c) Royal:   #7209b7 / #f72585 / #03071e / #fdfdfd
    d) Tech:    #00b4d8 / #ffd60a / #03045e / #caf0f8
    e) Custom (la que vos quieras!)

    BONUS:
    - Texto con clamp(min, fluido, max) para fluid typography
    - Animación CSS sutil en el botón principal
    - Ícono de scroll indicator al final del hero
    - Investigá @import en CSS para importar fuentes
    - Probá con clip-path para formas custom

    RECURSOS ÚTILES:
    - Imágenes: https://unsplash.com
    - Fuentes: https://fonts.google.com
    - Paletas: https://coolors.co
    - Gradientes: https://uigradients.com

    ¡Que sea hermoso! ✨
    ============================================================
    -->


</body>
</html>
