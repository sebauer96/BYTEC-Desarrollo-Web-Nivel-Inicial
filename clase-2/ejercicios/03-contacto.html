<!DOCTYPE html>

    <title>Ejercicio 03 - Formulario de Contacto</title>
    <!--

<body>

    <!--
    ============================================================
    EJERCICIO 03: Formulario de Contacto + CSS
    ============================================================

    CONSIGNA:
    Creá un formulario de contacto completo con HTML y CSS.

    REQUISITOS HTML:
    1. Un <h1> que diga "Contactanos"
    2. Un párrafo <p> con una descripción breve
    3. Un <form> con estos campos:
       a) Nombre → type="text"
       b) Email → type="email"
       c) Asunto → <select> con opciones:
          "Consulta general", "Soporte técnico", "Sugerencia"
       d) Mensaje → <textarea> (nuevo! buscá cómo funciona)
       e) Botón "Enviar Mensaje"

    4. Usá <label> para cada campo con for/id

    REQUISITOS CSS (en 03-style.css):
    1. Fondo oscuro para el body
    2. Un contenedor centrado con ancho máximo (max-width: 600px)
    3. Estilos para el h1 y el párrafo
    4. Estilos para inputs, select y textarea
    5. Una clase para el botón de enviar
    6. Al menos 1 efecto :hover

    DATO NUEVO - <textarea>:
    Es como un input pero para textos largos (varias líneas).
    Ejemplo: <textarea id="mensaje" rows="5" placeholder="Escribí tu mensaje..."></textarea>

    ¡Empezá a codear abajo!
    ============================================================
    -->



</body>
</html>
