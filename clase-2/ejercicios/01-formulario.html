<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 01 - Formulario desde cero</title>
</head>
<body>

    <!--
    ============================================================
    EJERCICIO 01: Formulario de Registro (Solo HTML)
    ============================================================

    CONSIGNA:
    Creá un formulario de registro para la plataforma BYTEC.
    NO uses CSS, solo HTML puro.

    REQUISITOS:
    1. Un título <h1> que diga "Crear Cuenta en BYTEC"
    2. Un <form> que contenga:
       a) Campo "Nombre completo" → type="text"
       b) Campo "Correo electrónico" → type="email"
       c) Campo "Contraseña" → type="password"
       d) Campo "Edad" → type="number"
       e) Lista desplegable "País" → <select> con al menos 4 países
       f) Botón "Registrarme" → type="submit"

    3. Cada campo debe tener:
       - Un <label> con el atributo "for"
       - Un <input> con el atributo "id" que coincida con el "for"
       - El atributo "placeholder" con texto de ayuda
       - El atributo "required" en los campos obligatorios

    PISTAS:
    - Recordá que for="algo" se conecta con id="algo"
    - El <select> necesita <option> adentro
    - La primera <option> del select puede tener value="" como placeholder

    ¡Empezá a codear abajo de este comentario!
    ============================================================
    -->



</body>
</html>
