<body>

    <!--
    ============================================================
    EJERCICIO 04 (DESAFÍO): Encuesta Completa
    ============================================================

    CONSIGNA:
    Creá una encuesta sobre hábitos tecnológicos.
    Este ejercicio te desafía a investigar etiquetas nuevas por tu cuenta.

    REQUISITOS HTML:
    1. Un <h1> con el título de la encuesta
    2. Un <p> explicando de qué trata
    3. Un <form> con TODOS estos tipos de campos:

       a) Nombre → type="text"
       b) Email → type="email"
       c) Edad → type="number" (con min y max)

       d) ¿Cuántas horas al día usás una computadora?
          → type="range" (NUEVO! Investigá cómo funciona)
             Pista: <input type="range" min="0" max="16" value="4">

       e) ¿Cuál es tu sistema operativo?
          → Radio buttons (NUEVO! Investigá type="radio")
             Pista: Varios <input type="radio" name="so">
                    Todos con el MISMO name pero distinto value
             Opciones: Windows, macOS, Linux

       f) ¿Qué tecnologías te interesan? (puede elegir varias)
          → Checkboxes (NUEVO! Investigá type="checkbox")
             Pista: <input type="checkbox" id="html" name="tech" value="html">
             Opciones: HTML, CSS, JavaScript, Python

       g) ¿Desde cuándo usás internet?
          → type="date" (NUEVO!)

       h) Comentarios adicionales → <textarea>

       i) Botón "Enviar Encuesta"

    4. Usá <label> para TODOS los campos

    REQUISITOS CSS (en 04-style.css):
    1. Tema oscuro estilo BYTEC (naranja #f75001, azul #04589d)
    2. Formulario centrado con max-width
    3. Cada sección de preguntas separada visualmente
    4. Al menos 2 clases CSS propias
    5. Efectos :hover en el botón
    6. Border-radius en los campos

    BONUS EXTRA:
    - Intentá agrupar preguntas con <fieldset> y <legend>
      (Buscá en Google cómo funcionan)
    - Agregá un <h2> para separar secciones

    ¡Empezá a codear abajo!
    ============================================================
    -->



</body>
</html>
