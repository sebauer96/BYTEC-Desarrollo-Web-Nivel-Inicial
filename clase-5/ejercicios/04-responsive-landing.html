    <!--
    ============================================================
    EJERCICIO 04 (DESAFÍO): Landing Page Responsive
    ============================================================

    CONSIGNA:
    Creá una landing page completa para un producto o servicio
    inventado. Debe ser 100% responsive con mobile first.
    ¡Este ejercicio es libre, usá tu creatividad!

    ESTRUCTURA SUGERIDA:

    1. NAVBAR
       - Mobile: logo centrado, links apilados debajo
       - Desktop: logo a la izquierda, links a la derecha
       - Usá display: flex + media queries

    2. HERO (sección principal)
       - Un título grande + subtítulo + botón CTA
       - Mobile: padding chico, texto centrado
       - Desktop: padding grande, tipografía más grande
       - BONUS: centrado vertical con min-height: 60vh + flexbox

    3. FEATURES (3-4 tarjetas)
       - Mobile: 1 columna
       - Tablet (768px+): 2 columnas
       - Desktop (1024px+): 3 o 4 columnas
       - Usá flex-wrap + flex-basis calculado

    4. TESTIMONIOS o STATS (sección extra)
       - Una franja con fondo diferente
       - Mobile: contenido apilado
       - Desktop: en fila

    5. CTA FINAL (llamada a la acción)
       - Título + botón grande centrado
       - Padding generoso que aumente en desktop

    6. FOOTER
       - Copyright + links
       - Mobile: centrado, apilado
       - Desktop: en fila con space-between

    REQUISITOS CSS:
    - * { box-sizing: border-box; }
    - Estrategia MOBILE FIRST (min-width)
    - Al menos 2 breakpoints (768px y 1024px)
    - Imágenes responsive (max-width: 100%)
    - Font-size que cambie según el breakpoint
    - Al menos 1 elemento que se oculte/muestre con display
    - max-width en contenedores para que no estiren en
      pantallas gigantes
    - Al menos 3 :hover effects

    BONUS:
    - Usá rem para los font-size en vez de px
    - Investigá min() o clamp() para tamaños fluidos:
      font-size: clamp(18px, 4vw, 36px);
    - Agregá un cuarto breakpoint para pantallas grandes (1440px+)
    - Hacé que la navbar tenga position: sticky

    COLORES SUGERIDOS:
    - Fondo: #0a0a23
    - Cards/secciones: #12123a
    - Naranja: #f75001
    - Azul: #04589d
    - Texto: white / #aaa

    ¡Empezá a codear abajo!
    ============================================================
    -->


</body>
</html>
