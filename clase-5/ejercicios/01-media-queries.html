<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 01 - Primeras Media Queries</title>
    <link rel="stylesheet" href="01-style.css">
</head>
<body>

    <!--
    ============================================================
    EJERCICIO 01: Primeras Media Queries
    ============================================================

    CONSIGNA:
    Experimentá con media queries cambiando colores, tamaños
    y layout según el ancho de la ventana del navegador.

    PASOS:
    1. Abrí 01-style.css y completá los valores con "TU-VALOR"
    2. Achicá la ventana del navegador y observá los cambios
    3. Usá el Inspector (F12) → ícono de celular para simular
       dispositivos

    PISTAS:
    - @media (min-width: 768px) { } = estilos para tablet+
    - @media (min-width: 1024px) { } = estilos para desktop+
    - min-width = "si la pantalla tiene al menos X pixeles"
    - Los estilos base (fuera de @media) son para mobile

    BONUS:
    - Agregá un tercer breakpoint en 1200px
    - Hacé que el banner cambie de color en cada breakpoint
    - Probá con max-width en vez de min-width
    ============================================================
    -->

    <div class="banner">
        <h1>¡Diseño Responsive!</h1>
        <p>Achicá la ventana para ver los cambios ↔️</p>
    </div>

    <div class="indicador">
        <span class="indicador-texto">Achicá o agrandá la ventana</span>
    </div>

    <div class="contenido">
        <div class="box">
            <h3>Caja 1</h3>
            <p>Esta caja cambia de layout según el tamaño de pantalla.</p>
        </div>
        <div class="box">
            <h3>Caja 2</h3>
            <p>En mobile se apilan verticalmente.</p>
        </div>
        <div class="box">
            <h3>Caja 3</h3>
            <p>En tablet y desktop van en fila.</p>
        </div>
    </div>

</body>
</html>
